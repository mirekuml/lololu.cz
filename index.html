<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOLOLU — Modernize IT with your people</title>
    <meta name="description" content="LOLOLU — Modernize IT with your people.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0%25' stop-color='%23e8ecf0'/%3E%3Cstop offset='100%25' stop-color='%23b8d4e3'/%3E%3C/linearGradient%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3CfeBlend in='SourceGraphic' mode='multiply'/%3E%3C/filter%3E%3C/defs%3E%3Crect width='32' height='32' rx='6' fill='url(%23g)' filter='url(%23n)'/%3E%3C/svg%3E">

    <style>
        /* ── Reset ── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        /* ── Fonts ── */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Grotesk:wght@400;500;600&display=swap');

        /* ── Page ── */
        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f0f2f5;
            color: #2a3140;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* ── Grainy gradient background ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                linear-gradient(
                    175deg,
                    rgba(232, 236, 240, 0.9) 0%,
                    rgba(200, 220, 235, 0.7) 40%,
                    rgba(184, 212, 227, 0.85) 100%
                );
            z-index: 0;
        }

        /* SVG noise grain texture */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.35;
            z-index: 1;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px 256px;
        }

        /* ── Subtle radial glow ── */
        .glow {
            position: fixed;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.5) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        /* ── Content ── */
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
        }

        /* ── Company name ── */
        .company-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.8rem, 7vw, 5.5rem);
            font-weight: 500;
            letter-spacing: 0.08em;
            line-height: 1.1;
            margin-bottom: 1rem;
            background: linear-gradient(
                135deg,
                #1e2a38 0%,
                #3a5068 50%,
                #1e2a38 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ── Divider ── */
        .divider {
            width: 48px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(42, 70, 100, 0.35), transparent);
            margin: 1.5rem auto;
        }

        /* ── Tagline ── */
        .tagline {
            font-size: clamp(0.95rem, 2vw, 1.15rem);
            font-weight: 300;
            color: rgba(42, 55, 72, 0.6);
            letter-spacing: 0.12em;
            /* no text-transform — preserve "IT" capitalization */
            margin-bottom: 3rem;
        }

        /* ── Contact ── */
        .contact a {
            font-size: 0.82rem;
            font-weight: 400;
            color: rgba(42, 70, 100, 0.45);
            text-decoration: none;
            letter-spacing: 0.08em;
            transition: color 0.4s ease, border-color 0.4s ease;
            border-bottom: 1px solid rgba(42, 70, 100, 0.15);
            padding-bottom: 2px;
        }

        .contact a:hover {
            color: rgba(42, 70, 100, 0.8);
            border-bottom-color: rgba(42, 70, 100, 0.35);
        }

        /* ── Fade-in animation ── */
        .container {
            animation: fadeIn 1.8s ease-out;
        }

        .divider {
            animation: fadeIn 2.2s ease-out;
        }

        .tagline {
            animation: fadeIn 2.4s ease-out;
        }

        .contact {
            animation: fadeIn 2.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Footer ── */
        .footer {
            position: fixed;
            bottom: 1.5rem;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 2;
            font-size: 0.68rem;
            color: rgba(42, 70, 100, 0.2);
            letter-spacing: 0.06em;
            animation: fadeIn 3.2s ease-out;
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="container">
        <h1 class="company-name">LOLOLU</h1>
        <div class="divider"></div>
        <p class="tagline">modernize IT with your people</p>
        <div class="contact">
            <a href="mailto:info@lololu.cz">info@lololu.cz</a>
        </div>
    </div>

    <footer class="footer">&copy; 2026 LOLOLU. All rights reserved.</footer>

</body>
</html>
